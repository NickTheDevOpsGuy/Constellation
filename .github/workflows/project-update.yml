name: Update README on PR (commit for same-repo, comment for forks)

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review, edited]
  workflow_dispatch:

permissions:
  contents: write # allow committing to same-repo PR branches
  pull-requests: write

concurrency:
  group: readme-on-pr-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  update-readme:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout PR HEAD (contributor branch)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 📝 Build “Next steps” + “Achievements” and patch README (no push yet)
        id: patch
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            // Built-in labels you want to include
            const TARGET_LABELS = [
              'bug',
              'enhancement',
              'help wanted',
              'good first issue',
              'documentation'
            ];
            const MAX_ACHIEVEMENTS = 5;

            const START_NEXT = '<!-- START:NEXT_STEPS -->';
            const END_NEXT   = '<!-- END:NEXT_STEPS -->';
            const START_ACH  = '<!-- START:ACHIEVEMENTS -->';
            const END_ACH    = '<!-- END:ACHIEVEMENTS -->';

            function hasMarker(c, s, e){ return c.includes(s) && c.includes(e); }

            async function listIssues({ state, labelsAND=[], per_page=50 }) {
              const out = [];
              let page = 1;
              while (true) {
                const res = await github.rest.issues.listForRepo({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  state,
                  labels: labelsAND.join(','),
                  per_page, page,
                  sort: 'updated', direction: 'desc'
                });
                const items = res.data.filter(x => !x.pull_request);
                out.push(...items);
                if (res.data.length < per_page) break;
                page++;
              }
              return out;
            }

            async function listAnyOfLabels(state, labels) {
              const seen = new Set();
              const all = [];
              for (const lb of labels) {
                const batch = await listIssues({ state, labelsAND: [lb] });
                for (const it of batch) {
                  if (!seen.has(it.id)) { seen.add(it.id); all.push(it); }
                }
              }
              all.sort((a,b) => new Date(b.updated_at) - new Date(a.updated_at));
              return all;
            }

            const nextIssues = await listAnyOfLabels('open', TARGET_LABELS);
            let achIssues = await listAnyOfLabels('closed', TARGET_LABELS);
            achIssues = achIssues.slice(0, MAX_ACHIEVEMENTS);

            const bullet = it => `- [${it.title}](${it.html_url})`;

            const nextBullets = nextIssues.length
              ? nextIssues.map(bullet).join('\n')
              : '_Nothing cooking right now 💤_';

            const achBullets = achIssues.length
              ? achIssues.map(bullet).join('\n')
              : '_No wins logged yet 🎯_';

            const readme = 'README.md';
            if (!fs.existsSync(readme)) core.setFailed('README.md not found.');

            let content = fs.readFileSync(readme, 'utf8');
            if (!hasMarker(content, START_NEXT, END_NEXT)) core.setFailed('NEXT_STEPS markers not found.');
            if (!hasMarker(content, START_ACH, END_ACH))   core.setFailed('ACHIEVEMENTS markers not found.');

            const blockNext = `${START_NEXT}\n${nextBullets}\n${END_NEXT}`;
            const blockAch  = `${START_ACH}\n${achBullets}\n${END_ACH}`;
            const patched = content
              .replace(new RegExp(`${START_NEXT}[\\s\\S]*?${END_NEXT}`, 'm'), blockNext)
              .replace(new RegExp(`${START_ACH}[\\s\\S]*?${END_ACH}`, 'm'), blockAch);

            const changed = patched !== content;
            if (changed) fs.writeFileSync(readme, patched);

            core.setOutput('changed', String(changed));
            core.setOutput('next', nextBullets);
            core.setOutput('ach', achBullets);

      - name: 🧪 Show diff (debug)
        if: steps.patch.outputs.changed == 'true'
        run: git --no-pager diff -- README.md || true

      - name: 🔁 Decide push vs comment
        id: route
        run: |
          if [ "${{ github.event.pull_request.head.repo.fork }}" = "true" ]; then
            echo "route=comment" >> $GITHUB_OUTPUT
          else
            echo "route=push" >> $GITHUB_OUTPUT
          fi

      - name: ✅ Commit & push to PR branch (same-repo PRs)
        if: steps.patch.outputs.changed == 'true' && steps.route.outputs.route == 'push'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "🤖 Update README: Next steps & Achievements [skip ci]"
          git push

      - name: 💬 Post/Update sticky PR comment (forked PRs)
        if: steps.patch.outputs.changed == 'true' && steps.route.outputs.route == 'comment'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: readme-next-achievements
          number: ${{ github.event.pull_request.number }}
          message: |
            ### 📝 README updates (preview)
            This PR comes from a fork, so I can’t push changes to your branch.

            **Next steps**:
            ```
            ${{ steps.patch.outputs.next }}
            ```

            **Achievements lately**:
            ```
            ${{ steps.patch.outputs.ach }}
            ```

            > Maintainers: To commit these changes, run this workflow on a same-repo PR or trigger it with write permissions.
