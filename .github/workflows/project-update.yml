name: Update README on PR (commit for same-repo, comment for forks)

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review, edited]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: readme-on-pr-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  update-readme:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      # REQUIRED: Set this repo variable in Settings → Variables → Repository variables
      # to the numeric project ID (the number at the end of the Project URL).
      PROJECT_NUMBER: ${{ vars.PROJECT_NUMBER }}
      # Optional: override if your project is under a different owner (org/user).
      PROJECT_OWNER: ${{ vars.PROJECT_OWNER || github.repository_owner }}
      # Tweak how many recently-finished items to show and what “recent” means.
      JUST_FINISHED_LIMIT: '10'
      JUST_FINISHED_DAYS: '21'

    steps:
      - name: ⬇️ Checkout PR HEAD (contributor branch)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 📝 Build Backlog & Just Finished from GitHub Project and patch README (no push yet)
        id: patch
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const core = require('@actions/core');

            const START_BACKLOG = '<!-- START:BACKLOG -->';
            const END_BACKLOG   = '<!-- END:BACKLOG -->';
            const START_JF      = '<!-- START:JUST_FINISHED -->';
            const END_JF        = '<!-- END:JUST_FINISHED -->';

            function mustHaveMarkers(content) {
              if (!content.includes(START_BACKLOG) || !content.includes(END_BACKLOG)) {
                core.setFailed('README missing BACKLOG markers.');
              }
              if (!content.includes(START_JF) || !content.includes(END_JF)) {
                core.setFailed('README missing JUST_FINISHED markers.');
              }
            }

            const projectOwner = process.env.PROJECT_OWNER;
            const projectNumber = Number(process.env.PROJECT_NUMBER || 0);
            if (!projectOwner || !projectNumber) {
              core.setFailed('PROJECT_OWNER/PROJECT_NUMBER not set. Add repo variable PROJECT_NUMBER (and optionally PROJECT_OWNER).');
            }

            const repoFull = `${context.repo.owner}/${context.repo.repo}`;
            const limitJF = Number(process.env.JUST_FINISHED_LIMIT || 10);
            const daysJF  = Number(process.env.JUST_FINISHED_DAYS || 21);
            const sinceJF = new Date(Date.now() - daysJF * 24*60*60*1000);

            // Fetch all items from the Project (v2) via GraphQL, paging as needed
            async function fetchProjectItems() {
              let items = [];
              let after = null;
              while (true) {
                const q = `
                  query($login:String!, $number:Int!, $after:String) {
                    user(login:$login) {
                      projectV2(number:$number) {
                        id
                        items(first: 100, after: $after) {
                          nodes {
                            id
                            updatedAt
                            content {
                              __typename
                              ... on Issue {
                                title number url closedAt updatedAt
                                repository { nameWithOwner }
                              }
                              ... on PullRequest {
                                title number url mergedAt closedAt updatedAt
                                repository { nameWithOwner }
                              }
                            }
                            fieldValues(first: 20) {
                              nodes {
                                ... on ProjectV2ItemFieldSingleSelectValue {
                                  field { ... on ProjectV2SingleSelectField { name } }
                                  name
                                }
                              }
                            }
                          }
                          pageInfo { hasNextPage endCursor }
                        }
                      }
                    }
                  }
                `;
                const data = await github.graphql(q, { login: projectOwner, number: projectNumber, after });
                const pv2 = data?.user?.projectV2;
                if (!pv2) core.setFailed(`Project not found for owner=${projectOwner} number=${projectNumber}.`);
                const page = pv2.items.nodes;
                items = items.concat(page);
                const pi = pv2.items.pageInfo;
                if (!pi.hasNextPage) break;
                after = pi.endCursor;
              }
              return items;
            }

            const items = await fetchProjectItems();

            // Helper to read the project's "Status" single-select
            function getStatusName(node) {
              for (const fv of node.fieldValues.nodes || []) {
                if (fv?.field?.name === 'Status') return fv.name; // e.g., Backlog, Ready, In progress, In review, Done
              }
              return undefined;
            }

            // Normalize item into a simple record
            function normalize(node) {
              const status = getStatusName(node) || '';
              const c = node.content;
              const repo = c?.repository?.nameWithOwner || '';
              const title = c?.title || '(draft project item)';
              let url = c?.url || undefined;
              let number = c?.number || undefined;

              // Pick the "finished" timestamp
              const finishedAt = c?.mergedAt || c?.closedAt || null;
              const updatedAt  = new Date(node.updatedAt);

              return { status, repo, title, url, number, finishedAt: finishedAt ? new Date(finishedAt) : null, updatedAt };
            }

            // Filter to items belonging to this repository only
            const norm = items.map(normalize).filter(n => n.repo === repoFull);

            // Build Backlog bullets
            const backlog = norm.filter(n => n.status.toLowerCase() === 'backlog');
            const backlogBullets = backlog.length
              ? backlog.map(n => {
                  const prefix = n.number ? `#${n.number} ` : '';
                  const link = n.url ? `[${prefix}${n.title}](${n.url})` : `${prefix}${n.title}`;
                  return `- ${link}`;
                }).join('\n')
              : '_No backlog items right now._';

            // Build Just Finished bullets (recently moved to Done)
            const done = norm.filter(n => n.status.toLowerCase() === 'done');
            const recentDone = done
              .map(n => ({ ...n, when: n.finishedAt || n.updatedAt }))
              .filter(n => n.when >= sinceJF)
              .sort((a,b) => b.when - a.when)
              .slice(0, limitJF);

            const jfBullets = recentDone.length
              ? recentDone.map(n => {
                  const whenStr = n.when.toISOString().split('T')[0];
                  const prefix = n.number ? `#${n.number} ` : '';
                  return `- ${n.url ? `[${prefix}${n.title}](${n.url})` : `${prefix}${n.title}`} — _${whenStr}_`;
                }).join('\n')
              : `_No items finished in the last ${daysJF} days._`;

            // Patch README
            const readme = 'README.md';
            if (!fs.existsSync(readme)) core.setFailed('README.md not found.');
            let content = fs.readFileSync(readme, 'utf8');
            mustHaveMarkers(content);

            const blockBacklog = `${START_BACKLOG}\n${backlogBullets}\n${END_BACKLOG}`;
            const blockJF      = `${START_JF}\n${jfBullets}\n${END_JF}`;

            const patched = content
              .replace(new RegExp(`${START_BACKLOG}[\\s\\S]*?${END_BACKLOG}`, 'm'), blockBacklog)
              .replace(new RegExp(`${START_JF}[\\s\\S]*?${END_JF}`, 'm'), blockJF);

            const changed = patched !== content;
            if (changed) fs.writeFileSync(readme, patched);

            core.setOutput('changed', String(changed));
            core.setOutput('backlog', backlogBullets);
            core.setOutput('just_finished', jfBullets);

      - name: 🧪 Show diff (debug)
        if: steps.patch.outputs.changed == 'true'
        run: git --no-pager diff -- README.md || true

      - name: 🔁 Decide push vs comment
        id: route
        run: |
          if [ "${{ github.event.pull_request.head.repo.fork }}" = "true" ]; then
            echo "route=comment" >> $GITHUB_OUTPUT
          else
            echo "route=push" >> $GITHUB_OUTPUT
          fi

      - name: ✅ Commit & push to PR branch (same-repo PRs)
        if: steps.patch.outputs.changed == 'true' && steps.route.outputs.route == 'push'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "🤖 Update README: Backlog & Just finished [skip ci]"
          git push

      - name: 💬 Post/Update sticky PR comment (forked PRs)
        if: steps.patch.outputs.changed == 'true' && steps.route.outputs.route == 'comment'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: readme-project-sync
          number: ${{ github.event.pull_request.number }}
          message: |
            ### 📝 README updates (preview)
            This PR comes from a fork, so I can’t push changes to your branch.

            **Backlog:**
            ```
            ${{ steps.patch.outputs.backlog }}
            ```

            **Just finished:**
            ```
            ${{ steps.patch.outputs.just_finished }}
            ```

            > Maintainers: To commit these changes, run this workflow on a same-repo PR or trigger it with write permissions.
