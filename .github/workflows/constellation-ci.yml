# .github/workflows/linkmap-ci.yml
name: 🗺️ LinkMap — CI (Prettier · ESLint · TSC)

on:
  push:
  pull_request:
    paths:
      - 'Apps/LinkMap/**'
      # include shared stuff this app depends on (optional)
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'yarn.lock'
      - '.github/workflows/linkmap-**'

concurrency:
  group: linkmap-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    name: 🎨 Prettier · ✨ ESLint · 🛠️ TypeScript
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Apps/LinkMap

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v5

      - name: 🧰 Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Apps/LinkMap/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🎨 Prettier — check formatting
        run: npx prettier . --check

      - name: ✨ ESLint — lint code
        run: npx eslint . --max-warnings=0

      - name: 🛠️ TypeScript — type check
        run: npx tsc --noEmit --pretty false