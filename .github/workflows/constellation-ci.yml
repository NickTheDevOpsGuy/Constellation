# .github/workflows/linkmap-ci.yml
name: 🗺️ Constellation — CI (Prettier · ESLint · TSC)

on:
  pull_request:
    branches:
      - develop

concurrency:
  group: linkmap-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    name: 🎨 Prettier · ✨ ESLint · 🛠️ TypeScript
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: .

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v5

      - name: 🧰 Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔧 Build App (Vite)
        run: npm run build

      - name: 🧪 Run ESLint
        run: npx eslint src --ext .js,.jsx,.ts,.tsx --cache

      - name: 🎨 Prettier — check formatting
        run: |
          npx prettier \
          --config .prettierrc.yml \
          --check . \
          --ignore-path .prettierignore

      - name: ✨ ESLint — lint code
        run: npx eslint . --max-warnings=0

      - name: 🛠️ TypeScript — type check
        run: npx tsc --noEmit --pretty false
